<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein KI‑Tagebuch – Big Data & Analytics</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.15);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #fb7185;
            --success: #4ade80;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 16px;
        }

        .container {
            width: 100%;
            max-width: 960px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.98));
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.7),
                0 0 0 1px rgba(148, 163, 184, 0.3) inset;
            padding: 28px 24px 32px;
            position: relative;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.28), transparent 70%);
            top: -80px;
            right: -80px;
            filter: blur(4px);
            pointer-events: none;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .title-block {
            max-width: 540px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 2rem;
            letter-spacing: 0.03em;
            color: #f9fafb;
        }

        .subtitle {
            margin: 0;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: radial-gradient(circle at top left, rgba(148, 163, 184, 0.18), transparent 60%);
            color: #e5e7eb;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(22, 163, 74, 0.12);
            color: #bbf7d0;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--success);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.7);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
            gap: 20px;
            align-items: flex-start;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.9));
            border-radius: 14px;
            border: 1px solid rgba(55, 65, 81, 0.8);
            padding: 16px 14px 14px;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 0.95rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #9ca3af;
        }

        .card-badge {
            font-size: 0.72rem;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.6);
            color: #e5e7eb;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entry {
            border-radius: 10px;
            padding: 10px 10px 9px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(17, 24, 39, 0.98));
            border: 1px solid rgba(55, 65, 81, 0.9);
            position: relative;
        }

        .entry-label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
        }

        .entry-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #9ca3af;
        }

        .entry-meta {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .entry-title {
            margin: 5px 0 4px;
            font-size: 0.95rem;
            color: #e5e7eb;
        }

        .entry-text {
            margin: 0;
            font-size: 0.85rem;
            line-height: 1.35;
            color: #d1d5db;
        }

        .entry-pill-row {
            margin-top: 7px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .entry-pill {
            font-size: 0.72rem;
            padding: 3px 9px;
            border-radius: 999px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            color: #9ca3af;
        }

        .entry-pill.accent {
            border-color: rgba(56, 189, 248, 0.8);
            color: #bae6fd;
            background: rgba(8, 47, 73, 0.7);
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .analytics-chip {
            border-radius: 10px;
            padding: 9px 9px 8px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), rgba(17, 24, 39, 0.98));
        }

        .analytics-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #9ca3af;
        }

        .analytics-name {
            margin: 4px 0 3px;
            font-size: 0.95rem;
            color: #e5e7eb;
        }

        .analytics-desc {
            margin: 0;
            font-size: 0.8rem;
            color: #cbd5f5;
            line-height: 1.35;
        }

        .analytics-tag {
            display: inline-block;
            margin-top: 5px;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.7);
            color: #9ca3af;
        }

        .analytics-chip.descriptive {
            border-color: rgba(125, 211, 252, 0.9);
        }

        .analytics-chip.diagnostic {
            border-color: rgba(129, 140, 248, 0.9);
        }

        .analytics-chip.predictive {
            border-color: rgba(45, 212, 191, 0.9);
        }

        .analytics-chip.prescriptive {
            border-color: rgba(251, 113, 133, 0.9);
        }

        .video-card {
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.96));
            border-radius: 14px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            padding: 14px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
        }

        .video-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #9ca3af;
        }
